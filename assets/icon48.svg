<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="100%" stop-color="#3D0066"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Calendar body -->
  <rect x="24" y="36" width="80" height="68" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Calendar top bar -->
  <rect x="24" y="36" width="80" height="18" rx="8" fill="rgba(255,255,255,0.2)"/>
  <rect x="24" y="46" width="80" height="8" fill="rgba(255,255,255,0.2)"/>

  <!-- Calendar binding rings -->
  <rect x="42" y="28" width="6" height="16" rx="3" fill="rgba(255,255,255,0.6)"/>
  <rect x="80" y="28" width="6" height="16" rx="3" fill="rgba(255,255,255,0.6)"/>

  <!-- Colored course blocks -->
  <rect x="28" y="60" width="14" height="11" rx="3" fill="#A78BFA" opacity="0.85"/>
  <rect x="47" y="74" width="15" height="11" rx="3" fill="#34D399" opacity="0.85"/>
  <rect x="67" y="60" width="15" height="23" rx="3" fill="#F472B6" opacity="0.7"/>
  <rect x="87" y="88" width="14" height="11" rx="3" fill="#60A5FA" opacity="0.85"/>
  <rect x="28" y="88" width="14" height="11" rx="3" fill="#FBBF24" opacity="0.85"/>

  <!-- Lightning bolt -->
  <polygon points="72,16 56,58 68,58 54,82 80,48 66,48 78,16" fill="url(#bolt)" filter="url(#glow)" opacity="0.92"/>
</svg>
