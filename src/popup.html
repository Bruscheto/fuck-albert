<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albert Course Planner</title>
    <link rel="stylesheet" href="course-metadata-panel.css">
    <link rel="stylesheet" href="popup.css">
    <script src="chrome-mock.js"></script>
</head>

<body>
    <div class="popup-container">
        <header class="popup-header">
            <div class="popup-header-top">
                <div class="popup-header-title">
                    <span class="popup-path" aria-hidden="true">~/</span><span class="popup-app-name">fuck-albert</span>
                </div>
                <div class="popup-header-actions">
                    <button id="btn-weekly-view" class="icon-btn" title="Open weekly view" aria-label="Open weekly view">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </button>
                    <button id="btn-settings" class="icon-btn" title="Settings" aria-label="Settings">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="popup-header-meta">
                <span class="term-badge" id="term-badge">loading</span>
                <span class="popup-status-sep" aria-hidden="true">·</span>
                <span id="stat-courses-count">0 courses</span>
            </div>
        </header>

        <div class="scrollable-content">
            <section class="popup-section">
                <h2 class="popup-section-heading"><span class="popup-section-prefix" aria-hidden="true">//</span> planner</h2>
                <div id="planning-tray-container" class="planning-tray-container">
                    <div class="loading">loading planned courses...</div>
                </div>
            </section>

            <section class="popup-section">
                <h2 class="popup-section-heading"><span class="popup-section-prefix" aria-hidden="true">//</span> buckets</h2>
                <div id="buckets-container" class="buckets-container">
                    <div class="loading">loading courses...</div>
                </div>
            </section>
        </div>

        <section class="actions-section actions-primary">
            <button id="btn-fetch" class="btn-primary btn-fetch">
                <svg class="btn-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span class="btn-label" id="btn-fetch-label">fetch from albert</span>
            </button>
        </section>

        <section class="actions-section actions-secondary">
            <button id="btn-export" class="btn-secondary">export</button>
            <button id="btn-clear" class="btn-secondary btn-danger">clear courses</button>
        </section>

        <footer class="popup-footer">
            <a href="#" id="link-help" class="popup-footer-link">why this exists</a>
            <span class="popup-footer-version">v1.0</span>
        </footer>

        <div id="settings-panel" class="settings-panel hidden">
            <div class="settings-header">
                <h2>settings</h2>
                <button id="btn-close-settings" class="icon-btn" aria-label="Close settings">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                        <path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="1.6"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <label for="setting-theme">Theme</label>
                    <select id="setting-theme" class="setting-select">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                        <option value="system">System</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label class="setting-toggle">
                        <input type="checkbox" id="setting-notifications">
                        <span class="toggle-label">Notifications</span>
                    </label>
                </div>
            </div>
        </div>

        <div id="course-metadata-backdrop" class="course-metadata-backdrop"></div>
        <aside id="course-metadata-drawer" class="course-metadata-drawer" aria-hidden="true">
            <div class="course-metadata-drawer-header">
                <div>
                    <p class="course-metadata-drawer-eyebrow">// course details</p>
                    <h2 id="course-metadata-drawer-title">course metadata</h2>
                </div>
                <button id="course-metadata-close" class="course-metadata-close" type="button" aria-label="Close course metadata panel">✕</button>
            </div>
            <div id="course-metadata-drawer-body" class="course-metadata-drawer-body"></div>
        </aside>
    </div>

    <script src="popup.js" type="module"></script>
</body>

</html>
